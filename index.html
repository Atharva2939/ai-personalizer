<!DOCTYPE html>
<html>
<head>
  <title>AI CRO Personalizer</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    .output {
      margin-top: 30px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }
    .card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>🚀 AI CRO Personalizer</h1>

  <div class="container">
    <label>Ad Creative</label>
    <input id="ad" placeholder="Paste ad text here" />

    <label>Landing Page URL</label>
    <input id="url" placeholder="https://example.com" />

    <button onclick="generate()">Generate</button>

    <div class="output" id="output"></div>
  </div>

  <script>
    async function generate() {
      const ad = document.getElementById("ad").value;
      const url = document.getElementById("url").value;

      document.getElementById("output").innerHTML = "⏳ Generating...";

      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ ad, url })
      });

      const data = await res.json();

      document.getElementById("output").innerHTML = `
        <h2>🔍 Before (Original Page)</h2>
        <iframe src="${url}"></iframe>

        <h2>✨ After (Personalized)</h2>
        <div class="card">
          ${data.result}
        </div>
      `;
    }
  </script>
</body>
</html>
