<!DOCTYPE html>
<html>
<head>
  <title>AI CRO Personalizer</title>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 40px;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      background: #ff7a18;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      animation: fadeIn 0.6s ease-in;
    }

    .score {
      font-size: 28px;
      font-weight: bold;
      color: #16a34a;
    }

    .grid {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .box {
      flex: 1;
      padding: 20px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    .before {
      border-left: 6px solid #ef4444;
    }

    .after {
      border-left: 6px solid #22c55e;
      background: #f0fdf4; /* richer green */
      box-shadow: 0 6px 25px rgba(34,197,94,0.25);
    }

    .box h1 {
      color: #111827;
    }

    .box p {
      color: #374151;
    }

    a {
      color: #4f46e5;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>

<h1>🚀 AI CRO Personalizer</h1>

<div class="container">

  <label>Ad Creative</label>
  <input id="ad" placeholder="Enter ad text..." />

  <label>Landing Page URL</label>
  <input id="url" placeholder="https://example.com" />

  <button onclick="generate()">Generate Optimization</button>

  <div id="output"></div>

</div>

<script>
async function generate() {
  const ad = document.getElementById("ad").value;
  const url = document.getElementById("url").value;

  document.getElementById("output").innerHTML = "⏳ Optimizing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ ad, url })
    });

    const data = await res.json();

    document.getElementById("output").innerHTML = `
      
      <div class="card">
        <h2>📊 Conversion Score</h2>
        <div class="score">${data.score || 75}/100</div>
        <p>${data.reason || "AI-generated optimization insights."}</p>
      </div>

      <div class="grid">
        
        <div class="box before">
          <h3>🔴 Before (Generic Page)</h3>
          <h1>Welcome to Our Platform</h1>
          <p>We offer solutions for everyone.</p>
          <button>Learn More</button>

          <hr/>
          <p style="color:#6b7280;">
            ❌ No message match<br/>
            ❌ Weak CTA<br/>
            ❌ Generic experience
          </p>
        </div>

        <div class="box after">
          <h3>🟢 After (AI Personalized)</h3>
          ${data.result || "<p>Personalized content generated based on ad.</p>"}
        </div>

      </div>

      <div class="card">
        <h3>🔗 Original Page</h3>
        <a href="${url}" target="_blank">${url}</a>
      </div>
    `;
  } catch (err) {
    document.getElementById("output").innerHTML = `
      <div class="card">
        ❌ Something went wrong. Please try again.
      </div>
    `;
  }
}
</script>

</body>
</html>
