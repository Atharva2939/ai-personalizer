<!DOCTYPE html>
<html>
<head>
  <title>AI CRO Personalizer</title>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 40px;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background: #ff7a18;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .score {
      font-size: 28px;
      color: #16a34a;
      font-weight: bold;
    }

    .grid {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .box {
      flex: 1;
      padding: 20px;
      border-radius: 12px;
      background: white;
    }

    /* BEFORE (FIXED) */
    .before {
      border-left: 6px solid #ef4444;
      background: #fee2e2;
      color: #7f1d1d;
    }

    .before h1 {
      color: #7f1d1d;
    }

    .before p {
      color: #991b1b;
    }

    .before button {
      background: #ef4444;
      color: white;
      font-weight: bold;
    }

    /* AFTER (FIXED) */
    .after {
      border-left: 6px solid #16a34a;
      background: #dcfce7;
      box-shadow: 0 8px 25px rgba(34,197,94,0.3);
    }

    .after section {
      color: #064e3b;
    }

    .after h1 {
      color: #065f46;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .after p {
      color: #064e3b;
    }

    .after li {
      color: #065f46;
      margin: 5px 0;
    }

    .after button {
      background: #16a34a;
      color: white;
      font-weight: bold;
      margin-top: 10px;
    }

    section ul {
      padding-left: 20px;
    }

    a {
      color: #4f46e5;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h1>🚀 AI CRO Personalizer</h1>

<div class="container">

  <label>Ad Creative</label>
  <input id="ad" placeholder="Enter ad text..." />

  <label>Landing Page URL</label>
  <input id="url" placeholder="https://example.com" />

  <button onclick="generate()">Generate Optimization</button>

  <div id="output"></div>

</div>

<script>
async function generate() {
  const ad = document.getElementById("ad").value;
  const url = document.getElementById("url").value;

  document.getElementById("output").innerHTML = "⏳ Optimizing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ ad, url })
    });

    const data = await res.json();

    document.getElementById("output").innerHTML = `
      
      <div class="card">
        <h2>📊 Conversion Score</h2>
        <div class="score">${data.score}/100</div>
        <p>${data.reason}</p>
      </div>

      <div class="grid">
        
        <div class="box before">
          <h3>🔴 Before</h3>
          <h1>Welcome to Our Platform</h1>
          <p>We offer solutions for everyone.</p>
          <button>Learn More</button>
        </div>

        <div class="box after">
          <h3>🟢 After (AI Personalized)</h3>
          ${data.result}
        </div>

      </div>

      <div class="card">
        <h3>🔗 Original Page</h3>
        <a href="${url}" target="_blank">${url}</a>
      </div>
    `;
  } catch (err) {
    document.getElementById("output").innerHTML = `
      <div class="card">
        ❌ Something went wrong. Please try again.
      </div>
    `;
  }
}
</script>

</body>
</html>
