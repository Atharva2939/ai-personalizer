<!DOCTYPE html>
<html>
<head>
  <title>AI Landing Page Personalizer</title>
</head>
<body>
  <h2>AI CRO Personalizer</h2>

  <label>Ad Creative:</label><br>
  <input id="ad" style="width:400px"><br><br>

  <label>Landing Page URL:</label><br>
  <input id="url" style="width:400px"><br><br>

  <button onclick="generate()">Generate</button>

  <h3>Output:</h3>
  <div id="output"></div>

  <script>
    async function generate() {
      const ad = document.getElementById("ad").value;
      const url = document.getElementById("url").value;

      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ ad, url })
      });

      const data = await res.json();
      document.getElementById("output").innerHTML = data.result || "Error generating output";
    }
  </script>
</body>
</html>
